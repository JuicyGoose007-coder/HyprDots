# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

# Change the default prompt format
format = """\
[в•ӯв•ҙ](238)$env_var\
$all[в•°в”Җ](238)$character"""



# Change the default prompt characters
[character]
success_symbol ='[вһң](bold green)'  #"[п•“](238)"
error_symbol = '[вң—](bold red) ' #"[п•“](238)"
vimcmd_symbol = "[пғ¬ ](bold lavender)"

# Shows an icon that should be included by zshrc script based on the distribution or os
# [env_var.STARSHIP_DISTRO]
# format = '[$env_value](bold white)'  # removed space between distro and rest for pwsh
# variable = "STARSHIP_DISTRO"
# disabled = false

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[aws]
format = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'
symbol = 'у°ёҸ '
disabled = true
# Shows the username
[username]
style_user = "green bold"
style_root = "black bold"
format = "пҚ… [$user]($style)"
disabled = false  # disable in powershell
show_always = true

[hostname]
ssh_only = false
format = "-[CachyOS](bold white)"
disabled = false

[directory]
style = "bold green"
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = " ~"
read_only_style = "197"
read_only = " пҖЈ "
format = "[$path]($style)[$read_only]($read_only_style) "

[golang]
symbol = "оҳ§ "

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "рҹҸі"
up_to_date = "пҒҶ "
untracked = "п”© "
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
stashed = "пЈ– "
modified = "пҒ„ "
staged = '[++\($count\)](green)'
renamed = "пӘ¶ "
deleted = "пҖ” "

[terraform]
format = "via [п„ө terraform $version]($style) пҘӮ [$workspace]($style) "


[docker_context]
format = "via [пҢҲ $context](bold blue) "

[helm]
format = "via [пҲҡ $version](bold purple) "

[python]
symbol = "п ҹ "
python_binary = "python3"

[nodejs]
format = "via [пўҳ $version](bold green) "

[ruby]
format = "via [оҲҫ $version]($style) "

[rust]
symbol = "оҡӢ "

[bun]
format = '[$symbol($version )]($style)'
symbol = 'у°і® '

[c]
format = '[$symbol($version(-$name) )]($style)'
symbol = 'оҷү '

[conda]
format = '[$symbol$environment]($style) '
symbol = 'п„Ң '

[container]
format = '[$symbol\[$name\]]($style) '
symbol = 'п’· '
