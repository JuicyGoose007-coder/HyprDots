gui:
  language: en
  scrollHeight: 2
  scrollPastBottom: false
  sidePanelWidth: 0.2
  expandFocusedSidePanel: true
  showFileTree: true
  nerdFontsVersion: "3"
  showFileIcons: true
  border: Rounded
  animateDismissal: false
  filterMode: fuzzy
  statusPanelView: allBranchesLog
  showBranchCommitHash: true
  showDivergenceFromBaseBranch: arrowAndNumber
  mainPanelSplitMode: flexible
  timeFormat: "02 Jan 06"
  shortTimeFormat: "3:04PM"
  mouseEvents: true
  theme:
  activeBorderColor: ["#a6dc07", "bold"]
  inactiveBorderColor: ["#538882"]
  searchingActiveBorderColor: ["#dc7907", "bold"]
  optionsTextColor: ["#a6dc07"]
  selectedLineBgColor: ["#432722"]
  cherryPickedCommitFgColor: ["#a6dc07"]
  cherryPickedCommitBgColor: ["#538882"]
  unstagedChangesColor: ["#e92906"]
  defaultFgColor: ["#aee6de"]
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --side-by-side --line-numbers --syntax-theme="TwoDark"
os:
  editPreset: "nvim"
