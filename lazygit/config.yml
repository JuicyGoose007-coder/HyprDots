gui:
  language: en
  scrollHeight: 2
  scrollPastBottom: false
  sidePanelWidth: 0.2
  expandFocusedSidePanel: true
  showFileTree: true
  nerdFontsVersion: "3"
  showFileIcons: true
  border: Rounded
  animateDismissal: false
  filterMode: fuzzy
  statusPanelView: allBranchesLog
  showBranchCommitHash: true
  showDivergenceFromBaseBranch: arrowAndNumber
  mainPanelSplitMode: flexible
  timeFormat: "02 Jan 06"
  shortTimeFormat: "3:04PM"
  mouseEvents: true
  theme:
  activeBorderColor: ["#dc075a", "bold"]
  inactiveBorderColor: ["#66666C"]
  searchingActiveBorderColor: ["#0967dc", "bold"]
  optionsTextColor: ["#dc075a"]
  selectedLineBgColor: ["#43383C"]
  cherryPickedCommitFgColor: ["#dc075a"]
  cherryPickedCommitBgColor: ["#66666C"]
  unstagedChangesColor: ["#dd0748"]
  defaultFgColor: ["#dddee6"]
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --side-by-side --line-numbers --syntax-theme="TwoDark"
os:
  editPreset: "nvim"
