# Hyprland config — ported from niri config.kdl
# https://wiki.hypr.land/Configuring/

# ────────────── Monitors ──────────────
monitor = DP-2, 2560x1440@164.999, 1920x0, 1
monitor = DP-1, 1920x1080@60.000, 0x0, 1

# ────────────── Programs ──────────────
$terminal = ghostty
$fileManager = nautilus
$menu = wofi
$browser = brave

# ────────────── Autostart ──────────────
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = swww-daemon
exec-once = sleep 0.5 && swww img ~/Pictures/wallpapers/sushi.jpg
exec-once = qs -c noctalia-shell
exec-once = brave
exec-once = steam
exec-once = vesktop

# ────────────── Environment Variables ──────────────
env = DISPLAY,:1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = COLORTERM,truecolor
env = TERM,xterm-256color
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ────────────── General ──────────────
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 3
    col.active_border = rgba(33b1ffee)
    col.inactive_border = rgba(161616ee)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# ────────────── Decoration ──────────────
decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 30
        render_power = 3
        offset = 0, 5
        color = rgba(00000070)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# ────────────── Animations ──────────────
animations {
    enabled = yes

    bezier = easeOutQuad, 0.25, 0.46, 0.45, 0.94
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = snappy, 0.3, 0, 0.15, 1

    animation = windows, 1, 2, easeOutQuad, popin 80%
    animation = windowsOut, 1, 2, easeOutCubic, popin 80%
    animation = fade, 1, 3, snappy
    animation = workspaces, 1, 2, snappy, fade
    animation = border, 1, 5, snappy
}

# ────────────── Layout ──────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# ────────────── Misc ──────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ────────────── Input ──────────────
input {
    kb_layout = us
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ────────────── Keybindings ──────────────
$mainMod = SUPER

# Applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, N, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod ALT, L, exec, swaylock
bind = $mainMod, D, exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mainMod, G, exec, faugus-launcher
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Y, exec, ghostty -e zsh -ic yazi
bind = $mainMod, S, exec, ghostty -e zsh -ic spf

# Window Management
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, /mnt/storage/scripts/killgamescope.sh
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, T, togglefloating,
bind = $mainMod, W, togglegroup,

# Focus Navigation (arrow keys)
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

# Focus Navigation (vim keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Window Movement (arrow keys)
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Down, movewindow, d
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

# Window Movement (vim keys)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# Monitor Navigation
bind = $mainMod CTRL, Left, focusmonitor, l
bind = $mainMod CTRL, Right, focusmonitor, r
bind = $mainMod CTRL, H, focusmonitor, l
bind = $mainMod CTRL, J, focusmonitor, d
bind = $mainMod CTRL, K, focusmonitor, u
bind = $mainMod CTRL, L, focusmonitor, r

# Move to Monitor
bind = $mainMod CTRL SHIFT, Left, movewindow, mon:l
bind = $mainMod CTRL SHIFT, Down, movewindow, mon:d
bind = $mainMod CTRL SHIFT, Up, movewindow, mon:u
bind = $mainMod CTRL SHIFT, Right, movewindow, mon:r
bind = $mainMod CTRL SHIFT, H, movewindow, mon:l
bind = $mainMod CTRL SHIFT, J, movewindow, mon:d
bind = $mainMod CTRL SHIFT, K, movewindow, mon:u
bind = $mainMod CTRL SHIFT, L, movewindow, mon:r

# Workspace Navigation
bind = $mainMod, Page_Down, workspace, e+1
bind = $mainMod, Page_Up, workspace, e-1
bind = $mainMod, U, workspace, e+1
bind = $mainMod, I, workspace, e-1
bind = $mainMod CTRL, Down, movetoworkspace, e+1
bind = $mainMod CTRL, Up, movetoworkspace, e-1
bind = $mainMod CTRL, U, movetoworkspace, e+1
bind = $mainMod CTRL, I, movetoworkspace, e-1

# Mouse Wheel Navigation
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Numbered Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move to Numbered Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Sizing
bind = $mainMod, Minus, resizeactive, -10% 0
bind = $mainMod, Equal, resizeactive, 10% 0
bind = $mainMod SHIFT, Minus, resizeactive, 0 -10%
bind = $mainMod SHIFT, Equal, resizeactive, 0 10%
bind = $mainMod, C, centerwindow,

# Screenshots
bind = CTRL SHIFT, 1, exec, grim - | wl-copy
bind = CTRL SHIFT, 2, exec, grim -o $(hyprctl activeworkspace -j | jq -r '.monitor') - | wl-copy
bind = CTRL SHIFT, 3, exec, hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - - | wl-copy

# Audio Controls
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Emergency escape
bind = $mainMod, Escape, exec, hyprctl keyword input:kb_options ""

# Exit / Power
bind = CTRL ALT, Delete, exit,
bind = $mainMod SHIFT, P, dpms, off

# Overview (requires hyprexpo or hyprspace plugin — toggle with Mod+Space)
# bind = $mainMod, Space, hyprexpo:expo, toggle

# ────────────── Named Workspaces ──────────────
workspace = name:Gaming, monitor:DP-2
workspace = name:Main, monitor:DP-2, default:true
workspace = name:Discord, monitor:DP-1

# ────────────── Window Rules ──────────────

# No CSD
windowrule {
    name = no-csd
    match:class = .*
    suppress_event = maximize
}

# Corner radius for all windows (via decoration rounding = 12 above)

# Firefox PiP — float
windowrule {
    name = firefox-pip
    match:class = firefox
    match:title = ^Picture-in-Picture$
    float = true
    pin = true
}

# GNOME apps — slightly different rounding handled globally

# Settings/control panels — half width, tiled
windowrule {
    name = settings-panels
    match:class = ^(gnome-control-center|pavucontrol|nm-connection-editor)$
    size = 50% 80%
}

# Floating utilities
windowrule {
    name = float-utils
    match:class = ^(gnome-calculator|galculator|blueman-manager|xdg-desktop-portal)$
    float = true
}

# Terminal transparency
windowrule {
    name = terminal-opacity
    match:class = ^(com.mitchellh.ghostty|ghostty|Alacritty|kitty|org.wezfurlong.wezterm)$
    opacity = 0.9
}

# Steam games — fullscreen on Gaming workspace
windowrule {
    name = steam-games
    match:class = ^steam$
    match:title = ^(?!Steam$)
    fullscreen = 1
    workspace = name:Gaming
}

# Steam client
windowrule {
    name = steam-client
    match:class = ^steam$
    match:title = ^Steam$
    size = 50% 80%
    workspace = name:Gaming
}

# Faugus launcher
windowrule {
    name = faugus
    match:class = ^faugus-launcher$
    workspace = name:Gaming
}

# Battle.net
windowrule {
    name = battlenet
    match:title = ^Battle\.net
    size = 50% 80%
    workspace = name:Gaming
}

# Tidal
windowrule {
    name = tidal
    match:class = ^tidal-hifi$
    size = 50% 80%
    workspace = name:Discord
}

# Discord / Vesktop
windowrule {
    name = discord
    match:title = Discord
    opacity = 0.95
    workspace = name:Discord
    monitor = DP-1
}

# Ghostty
windowrule {
    name = ghostty-rules
    match:class = ^(com\.mitchellh\.ghostty|ghostty)$
    opacity = 0.9
    size = 50% 80%
}

# Solaar
windowrule {
    name = solaar
    match:class = ^solaar$
    monitor = DP-1
}

# Gamescope
windowrule {
    name = gamescope
    match:class = ^gamescope$
    fullscreen = 1
    workspace = name:Gaming
}

# KDevelop
windowrule {
    name = kdevelop
    match:class = ^org\.kde\.kdevelop$
    opacity = 0.95
    fullscreen = 1
}

# Zoom — float
windowrule {
    name = zoom-float
    match:class = ^zoom$
    float = true
}
