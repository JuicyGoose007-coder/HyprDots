# Generated by theme-switcher — tentacles.png
# Do not edit manually. Edit theme-switcher-hyprland.sh:generate_hyprlock instead.

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/juicygoose007/HyprDots/wallpapers/tentacles.png
    blur_passes = 2
    blur_size = 6
    noise = 0.0117
    contrast = 1.0
    brightness = 0.85
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# Clock (h:MM AM/PM)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
    color = rgba(221, 223, 230, 1.0)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(168, 172, 180, 0.9)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 220
    halign = center
    valign = center
}

# Username
label {
    monitor =
    text =   $USER
    color = rgba(220, 154, 9, 0.95)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# Input field (minimal pill)
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(220, 154, 9, 0.5)
    inner_color = rgba(49, 26, 29, 0.7)
    font_color = rgba(221, 223, 230, 1.0)
    fade_on_empty = false
    placeholder_text = <i>password</i>
    hide_input = false
    rounding = 25
    check_color = rgba(10, 94, 220, 0.85)
    fail_color = rgba(77, 220, 8, 0.85)
    fail_text = <b>$FAIL</b> <i>fail(s)</i> — try again
    fail_transition = 200
    capslock_color = rgba(8, 149, 220, 0.85)
    position = 0, -120
    halign = center
    valign = center
}
