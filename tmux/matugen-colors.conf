# Auto-generated by Matugen
set -g @matugen-bg "#18120c"
set -g @matugen-fg "#eee0d5"
set -g @matugen-primary "#faba72"
set -g @matugen-on-primary "#482900"
set -g @matugen-secondary "#e0c1a3"
set -g @matugen-tertiary "#bdcd9c"
set -g @matugen-surface-variant "#302921"
set -g @matugen-surface-container "#251e17"
set -g @matugen-outline "#9d8e81"
set -g @matugen-outline-variant "#50453a"

# Status bar layout
set -g status-interval 1
set -g status-justify centre
set -g status-left-length 80
set -g status-right-length 80

# Status bar colors
set -g status-style "bg=#{@matugen-bg},fg=#{@matugen-fg}"

# Pane borders
set -g pane-border-style "fg=#{@matugen-surface-variant}"
set -g pane-active-border-style "fg=#{@matugen-primary}"

# Window status
setw -g window-status-style "fg=#{@matugen-outline},dim"
setw -g window-status-current-style "bold,fg=#{@matugen-primary}"
set -g window-status-separator ' '
set -g window-status-format '#[fg=#{@matugen-bg},bg=#{@matugen-surface-variant}]#[fg=#{@matugen-fg},bg=#{@matugen-surface-variant}] #I:#W #[fg=#{@matugen-surface-variant},bg=#{@matugen-bg}]'
set -g window-status-current-format '#[fg=#{@matugen-bg},bg=#{@matugen-primary}]#[fg=#{@matugen-on-primary},bg=#{@matugen-primary},bold] #I:#W #[fg=#{@matugen-primary},bg=#{@matugen-bg}]'

# Message/command styles
set -g message-style "bg=#{@matugen-primary},fg=#{@matugen-on-primary}"
set -g message-command-style "bg=#{@matugen-secondary},fg=#{@matugen-bg}"

# Display panes
set -g display-panes-active-colour "#{@matugen-secondary}"
set -g display-panes-colour "#{@matugen-primary}"

# Clock
setw -g clock-mode-colour "#{@matugen-tertiary}"

# Copy mode
set -g copy-mode-match-style "bg=#{@matugen-primary},fg=#{@matugen-on-primary}"
set -g copy-mode-current-match-style "bg=#{@matugen-tertiary},fg=#{@matugen-bg},bold"

# Powerline status bar
set -g status-left '\
#[fg=#{@matugen-fg},bg=#{@matugen-bg}] 󰣇 #[fg=#{@matugen-bg},bg=#{@matugen-primary}]\
#[fg=#{@matugen-on-primary},bg=#{@matugen-primary},bold] #S #[fg=#{@matugen-primary},bg=#{@matugen-bg}]\
#[none]'

set -g status-right '\
#[fg=#{@matugen-surface-variant},bg=#{@matugen-bg}]\
#[fg=#{@matugen-fg},bg=#{@matugen-surface-variant}] %Y-%m-%d \
#[fg=#{@matugen-primary},bg=#{@matugen-surface-variant}]\
#[fg=#{@matugen-on-primary},bg=#{@matugen-primary}] %I:%M %p \
#[fg=#{@matugen-bg},bg=#{@matugen-primary}]'
