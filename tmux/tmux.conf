# Palette (Akiakane.jpg) — generated by theme-switcher
#   bg=#41100E  bg1=#432722  bg2=#538882  bg3=#77C3BA
#   fg=#aee6de  fg1=#77c3ba
#   purple=#d007dc  blue=#a6dc07  pink=#e92906
#   teal=#085bdc  green=#dc7906  red=#e92906

# Theme
set-option -g status-style bg=#432722,fg=#d007dc

# default window title colors
set-window-option -g window-status-style fg=#77c3ba,bg=default,dim

# active window title colors
set-window-option -g window-status-current-style fg=#d007dc,bg=default,bright

# pane border
set-option -g pane-border-style fg=#538882
set-option -g pane-active-border-style fg=#d007dc

# message text
set-option -g message-style bg=#432722,fg=#e92906

# pane number display
set-option -g display-panes-active-colour "#a6dc07"
set-option -g display-panes-colour "#d007dc"

# clock
set-window-option -g clock-mode-colour "#dc7906"


set -g status-interval 1
set -g status-justify centre
set -g status-left-length 80
set -g status-right-length 80

# Powerline status bar (matches p10k rainbow style)
# Left: [os_icon] > [session] > [window]
set -g status-left '\
#[fg=#aee6de,bg=#432722] 󰣇 #[fg=#432722,bg=#a6dc07]\
#[fg=#41100E,bg=#a6dc07,bold] #S #[fg=#a6dc07,bg=#432722]\
#[none]'

# Right: [pane] < [date] < [time]
set -g status-right '\
#[fg=#77C3BA,bg=#432722]\
#[fg=#aee6de,bg=#77C3BA] %Y-%m-%d \
#[fg=#d007dc,bg=#77C3BA]\
#[fg=#41100E,bg=#d007dc] %I:%M %p \
#[fg=#432722,bg=#d007dc]'

# Window status (center)
set -g window-status-format '#[fg=#432722,bg=#538882]#[fg=#77c3ba,bg=#538882] #I:#W #[fg=#538882,bg=#432722]'
set -g window-status-current-format '#[fg=#432722,bg=#dc7906]#[fg=#41100E,bg=#dc7906,bold] #I:#W #[fg=#dc7906,bg=#432722]'
set -g window-status-separator ' '

# C-b is not acceptable -- Vim uses it
set-option -g prefix C-a
bind-key C-a last-window

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition
set -s escape-time 50

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside
# another TMUX session
bind-key a send-prefix

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Vi copypaste mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# Mouse off
set -g mouse on
set -g focus-events on 

# Splits preserving current path
bind-key -N "New window"          c new-window -c "#{pane_current_path}"
bind-key -N "Split horizontal"    b split-window -v -c "#{pane_current_path}"
bind-key -N "Split vertical"      v split-window -h -c "#{pane_current_path}"

# Smart pane switching with vim-tmux-navigator (no prefix required)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\S+\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Prefix + hjkl as fallback
bind-key -N "Select pane left"    h select-pane -L
bind-key -N "Select pane down"    j select-pane -D
bind-key -N "Select pane up"      k select-pane -U
bind-key -N "Select pane right"   l select-pane -R

# Layouts (integer fallback for 3.1)
bind-key -N "Main-horizontal"    m select-layout main-horizontal
bind-key -N "Main-vertical"      M select-layout main-vertical

bind-key -N "New named window"    C command-prompt -p "Name of new window: " "new-window -n '%%'"

# reload config
bind-key -N "Reload config"       r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# Quick-action menu
bind Space display-menu -T "Quick Actions" \
  "Horizontal Split"  h "split-window -v -c '#{pane_current_path}'" \
  "Vertical Split"    v "split-window -h -c '#{pane_current_path}'" \
  "" \
  "Swap Up"           u "swap-pane -U" \
  "Swap Down"         d "swap-pane -D" \
  "" \
  "Kill Pane"         x "kill-pane" \
  "Kill Window"       X "kill-window"

# auto window rename
set-window-option -g automatic-rename

# Terminal (base — works on all 3.x)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -g history-limit 50000

# --- Version-gated features ---

# 3.2+: terminal-features, extended-keys, popups, clipboard
if-shell -F "#{>=:#{version},3.2}" {
    set -as terminal-features ",xterm-256color:RGB"
    set -g extended-keys on
    bind-key -N "Main-horizontal 66%" m setw main-pane-height 66% \; select-layout main-horizontal
    bind-key -N "Main-vertical 50%"   M setw main-pane-width 50% \; select-layout main-vertical
    bind-key -N "Popup shell"    t display-popup -E -w 80% -h 80%
    bind-key -N "Popup git log"  g display-popup -E -w 80% -h 80% "git log --oneline --graph -30"
    set -g copy-mode-match-style "bg=#d007dc,fg=#41100E"
    set -g copy-mode-current-match-style "bg=#e92906,fg=#41100E,bold"
    set -s set-clipboard on
    if-shell "command -v clip.exe" {
        set -s copy-command "clip.exe"
    } {
        if-shell "command -v pbcopy" {
            set -s copy-command "pbcopy"
        } {
            if-shell "command -v xclip" {
                set -s copy-command "xclip -selection clipboard >/dev/null"
            }
        }
    }
}

# 3.3+: pane border arrows
if-shell -F "#{>=:#{version},3.3}" {
    set -g pane-border-indicators arrows
}

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# continuum: auto-save every 15 min, auto-restore on server start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# resurrect: also save/restore nvim sessions (needs Session.vim)
set -g @resurrect-strategy-nvim 'session'

# TPM init — MUST be last line
run '~/.tmux/plugins/tpm/tpm'
